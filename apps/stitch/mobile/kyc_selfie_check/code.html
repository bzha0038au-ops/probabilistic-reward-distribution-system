</div>
<div class="w-full h-4 bg-surface-container-highest border-2 border-on-surface rounded-full overflow-hidden shadow-[2px_2px_0px_0px_rgba(28,27,27,1)]">

</div>
</div>
</div>

<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">face</span>
<p class="font-label-bold text-label-bold uppercase">Position your face within the frame</p>
</div>

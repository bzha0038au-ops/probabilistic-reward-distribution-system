appId: ${REWARD_MOBILE_APP_ID}
env:
  REWARD_E2E_EMAIL: mobile.e2e.alice@example.com
  REWARD_E2E_PASSWORD: User123!
---
- launchApp:
    clearState: true
- tapOn:
    text: "Allow"
    optional: true
- scrollUntilVisible:
    element:
      id: auth-login-seeded-button
    direction: DOWN
    timeout: 30000
    speed: 80
- tapOn:
    id: auth-login-seeded-button
    waitUntilVisible: true
- scrollUntilVisible:
    element:
      id: home-open-route-button-notifications
    direction: DOWN
    timeout: 30000
    speed: 60
    waitToSettleTimeoutMs: 500
    visibilityPercentage: 20
    centerElement: true
- tapOn:
    id: home-open-route-button-notifications
    waitUntilVisible: true
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      id: notifications-refresh-button
    direction: DOWN
    timeout: 30000
    speed: 60
    waitToSettleTimeoutMs: 500
    visibilityPercentage: 20
    centerElement: true
- assertVisible:
    id: notifications-refresh-button
- assertVisible:
    id: notifications-mark-all-read-button

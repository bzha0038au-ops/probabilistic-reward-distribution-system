appId: ${REWARD_MOBILE_APP_ID}
---
- launchApp:
    clearState: true
- tapOn:
    text: "Allow"
    optional: true
- scrollUntilVisible:
    element:
      id: auth-login-seeded-button
    direction: DOWN
    timeout: 30000
    speed: 80
- tapOn:
    id: auth-login-seeded-button
    waitUntilVisible: true
- assertVisible:
    id: app-notifications-bell-button
- scrollUntilVisible:
    element:
      id: home-open-route-button-holdem
    direction: DOWN
- tapOn:
    id: home-open-route-button-holdem
    waitUntilVisible: true
- scrollUntilVisible:
    element:
      id: holdem-lobby-card-mobile-maestro-e2e-holdem
    direction: DOWN
- tapOn:
    id: holdem-lobby-card-mobile-maestro-e2e-holdem
    waitUntilVisible: true
- scrollUntilVisible:
    element:
      id: holdem-action-button-fold
    direction: DOWN
    timeout: 90000
    speed: 60
    waitToSettleTimeoutMs: 500
    visibilityPercentage: 20
    centerElement: true
- assertVisible:
    id: holdem-action-button-fold
- assertVisible:
    id: holdem-action-button-all-in

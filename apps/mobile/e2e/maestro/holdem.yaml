appId: ${REWARD_MOBILE_APP_ID}
---
- launchApp:
    clearState: true
- scrollUntilVisible:
    element:
      id: auth-login-seeded-button
    direction: DOWN
- tapOn:
    id: auth-login-seeded-button
    waitUntilVisible: true
- tapOn:
    text: "Allow"
    optional: true
- assertVisible:
    id: home-open-route-button-account
- scrollUntilVisible:
    element:
      id: home-open-route-button-holdem
    direction: DOWN
- tapOn:
    id: home-open-route-button-holdem
    waitUntilVisible: true
- scrollUntilVisible:
    element:
      id: holdem-lobby-card-mobile-maestro-e2e-holdem
    direction: DOWN
- tapOn:
    id: holdem-lobby-card-mobile-maestro-e2e-holdem
    waitUntilVisible: true
- scrollUntilVisible:
    element:
      id: holdem-action-amount-input
    direction: DOWN
    timeout: 60000
    speed: 80
    visibilityPercentage: 20
- assertVisible:
    id: holdem-action-amount-input
- swipe:
    start: 50%, 85%
    end: 50%, 60%
    duration: 500
    waitToSettleTimeoutMs: 500
- assertVisible:
    text: "Call"
- assertVisible:
    text: "Fold"

appId: ${REWARD_MOBILE_APP_ID}
---
- launchApp:
    clearState: true
- tapOn:
    text: "Allow"
    optional: true
- scrollUntilVisible:
    element:
      id: auth-login-seeded-button
    direction: DOWN
    timeout: 30000
    speed: 80
- tapOn:
    id: auth-login-seeded-button
    waitUntilVisible: true
- assertVisible:
    id: app-notifications-bell-button
- scrollUntilVisible:
    element:
      id: home-open-route-button-predictionmarket
    direction: DOWN
- tapOn:
    id: home-open-route-button-predictionmarket
    waitUntilVisible: true
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      id: prediction-market-card-mobile-maestro-e2e-market
    direction: DOWN
- tapOn:
    id: prediction-market-card-mobile-maestro-e2e-market
    waitUntilVisible: true
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      id: prediction-market-outcome-card-up
    direction: DOWN
    centerElement: true
- tapOn:
    id: prediction-market-outcome-card-up
    waitUntilVisible: true
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      id: prediction-market-place-position-button
    direction: DOWN
    centerElement: true
- tapOn:
    id: prediction-market-place-position-button
    waitUntilVisible: true
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      id: prediction-market-position-card-up
    direction: DOWN
    timeout: 60000
    speed: 80
    visibilityPercentage: 20
- assertVisible:
    id: prediction-market-position-card-up

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: reward_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - reward_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reward_local"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - reward_redis_data:/data

volumes:
  reward_postgres_data:
  reward_redis_data:

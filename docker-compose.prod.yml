x-app-defaults: &app-defaults
  init: true
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

services:
  reverse-proxy:
    <<: *app-defaults
    image: ${PROXY_IMAGE:-caddy:2.8}
    env_file:
      - ./.env.d/compose.env
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      admin:
        condition: service_healthy
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./.proxy/data:/data
      - ./.proxy/config:/config
      - ./.proxy/logs:/var/log/caddy
    networks:
      - edge
      - app
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    <<: *app-defaults
    image: ${POSTGRES_IMAGE:-postgres:16}
    env_file:
      - ./.env.d/postgres.env
    volumes:
      - reward_postgres_data:/var/lib/postgresql/data
      - ./.secrets:/run/secrets:ro
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    <<: *app-defaults
    image: ${REDIS_IMAGE:-redis:7}
    command:
      - /bin/sh
      - -ec
      - exec redis-server --appendonly yes --requirepass "$$(cat /run/secrets/redis_password)"
    volumes:
      - reward_redis_data:/data
      - ./.secrets:/run/secrets:ro
    networks:
      - data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli --no-auth-warning -a "$$(cat /run/secrets/redis_password)" ping | grep -q PONG
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    <<: *app-defaults
    image: ${BACKEND_IMAGE:-reward-system/backend}:${IMAGE_TAG:-latest}
    restart: "no"
    command: ["pnpm", "--dir", "apps/database", "db:migrate"]
    env_file:
      - ./.env.d/backend.env
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data

  backend:
    <<: *app-defaults
    image: ${BACKEND_IMAGE:-reward-system/backend}:${IMAGE_TAG:-latest}
    env_file:
      - ./.env.d/backend.env
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "4000"
    networks:
      - app
      - data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:4000/health/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  notification-worker:
    <<: *app-defaults
    image: ${BACKEND_IMAGE:-reward-system/backend}:${IMAGE_TAG:-latest}
    command: ["pnpm", "--dir", "apps/backend", "start:worker:notifications"]
    env_file:
      - ./.env.d/backend.env
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - data

  fairness-audit-worker:
    <<: *app-defaults
    image: ${BACKEND_IMAGE:-reward-system/backend}:${IMAGE_TAG:-latest}
    command: ["pnpm", "--dir", "apps/backend", "start:worker:fairness-audits"]
    env_file:
      - ./.env.d/backend.env
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - data

  prediction-market-oracle-worker:
    <<: *app-defaults
    image: ${BACKEND_IMAGE:-reward-system/backend}:${IMAGE_TAG:-latest}
    command: ["pnpm", "--dir", "apps/backend", "start:worker:prediction-market-oracles"]
    env_file:
      - ./.env.d/backend.env
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - data

  kyc-reverification-worker:
    <<: *app-defaults
    image: ${BACKEND_IMAGE:-reward-system/backend}:${IMAGE_TAG:-latest}
    command: ["pnpm", "--dir", "apps/backend", "start:worker:kyc-reverification"]
    env_file:
      - ./.env.d/backend.env
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - data

  blackjack-timeout-worker:
    <<: *app-defaults
    image: ${BACKEND_IMAGE:-reward-system/backend}:${IMAGE_TAG:-latest}
    command: ["pnpm", "--dir", "apps/backend", "start:worker:blackjack-timeouts"]
    env_file:
      - ./.env.d/backend.env
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - data

  holdem-timeout-worker:
    <<: *app-defaults
    image: ${BACKEND_IMAGE:-reward-system/backend}:${IMAGE_TAG:-latest}
    command: ["pnpm", "--dir", "apps/backend", "start:worker:holdem-timeouts"]
    env_file:
      - ./.env.d/backend.env
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - data

  db-partition-maintenance-worker:
    <<: *app-defaults
    image: ${BACKEND_IMAGE:-reward-system/backend}:${IMAGE_TAG:-latest}
    command: ["pnpm", "--dir", "apps/backend", "start:worker:db-partition-maintenance"]
    env_file:
      - ./.env.d/backend.env
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data

  frontend:
    <<: *app-defaults
    image: ${FRONTEND_IMAGE:-reward-system/frontend}:${IMAGE_TAG:-latest}
    env_file:
      - ./.env.d/frontend.env
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - app
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  admin:
    <<: *app-defaults
    image: ${ADMIN_IMAGE:-reward-system/admin}:${IMAGE_TAG:-latest}
    env_file:
      - ./.env.d/admin.env
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - app
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/login').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  edge:
  app:
    internal: true
  data:
    internal: true

volumes:
  reward_postgres_data:
  reward_redis_data:

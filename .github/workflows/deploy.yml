name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      ref:
        description: Git ref to deploy
        required: true
        default: main
        type: string

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/reward_build
      POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/reward_build
      ADMIN_JWT_SECRET: deploy-admin-secret-1234567890abcdefghij
      USER_JWT_SECRET: deploy-user-secret-1234567890abcdefghij
      AUTH_SECRET: deploy-web-secret-1234567890abcdefghij
      API_BASE_URL: http://127.0.0.1:4000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:4000
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Package Release
        run: git archive --format=tar.gz --output release.tar.gz HEAD

      - name: Upload Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release.tar.gz

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: ${{ inputs.environment }}
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_RESTART_COMMAND: ${{ secrets.DEPLOY_RESTART_COMMAND }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
    steps:
      - name: Download Release Bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle

      - name: Validate Deployment Secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$DEPLOY_RESTART_COMMAND"

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust Remote Host
        run: ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload Release Bundle
        run: |
          scp release.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/reward-system-${GITHUB_SHA}.tar.gz"

      - name: Deploy Release
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            set -euo pipefail
            RELEASE_DIR='$DEPLOY_PATH/releases/$GITHUB_SHA'
            mkdir -p '$DEPLOY_PATH/releases'
            mkdir -p '$DEPLOY_PATH/shared'
            rm -rf \"\$RELEASE_DIR\"
            mkdir -p \"\$RELEASE_DIR\"
            tar -xzf '/tmp/reward-system-${GITHUB_SHA}.tar.gz' -C \"\$RELEASE_DIR\"
            cd \"\$RELEASE_DIR\"
            pnpm install --frozen-lockfile
            pnpm build
            pnpm --dir apps/database db:migrate
            ln -sfn \"\$RELEASE_DIR\" '$DEPLOY_PATH/current'
            cd '$DEPLOY_PATH/current'
            $DEPLOY_RESTART_COMMAND
          "

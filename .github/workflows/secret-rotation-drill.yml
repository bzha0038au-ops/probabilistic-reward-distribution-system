name: Secret Rotation Drill

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - production
      overlap_seconds:
        description: SaaS API key overlap window in seconds
        required: true
        default: "300"
        type: string

concurrency:
  group: secret-rotation-drill-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  drill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
      SAAS_OVERLAP_SECONDS: ${{ inputs.overlap_seconds }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Deployment Secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust Remote Host
        run: ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Execute Production Drill
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_ENVIRONMENT='$DEPLOY_ENVIRONMENT' SAAS_OVERLAP_SECONDS='$SAAS_OVERLAP_SECONDS' bash -s" <<'REMOTE'
          set -euo pipefail

          CURRENT_DIR="${DEPLOY_PATH}/current"
          SECRET_DIR="${DEPLOY_PATH}/shared/${DEPLOY_ENVIRONMENT}/secrets"
          TMP_DIR="$(mktemp -d)"
          JWT_ROLLBACK_REQUIRED=0

          cleanup() {
            if [ "${JWT_ROLLBACK_REQUIRED}" -eq 1 ]; then
              echo "JWT validation failed before commit. Rolling back secret files and restarting services." >&2
              printf '%s\n' "${ORIG_ADMIN_CURRENT}" > "${ADMIN_CURRENT_FILE}"
              printf '%s\n' "${ORIG_USER_CURRENT}" > "${USER_CURRENT_FILE}"
              if [ -n "${ORIG_ADMIN_PREVIOUS}" ]; then
                printf '%s\n' "${ORIG_ADMIN_PREVIOUS}" > "${ADMIN_PREVIOUS_FILE}"
              else
                rm -f "${ADMIN_PREVIOUS_FILE}"
              fi
              if [ -n "${ORIG_USER_PREVIOUS}" ]; then
                printf '%s\n' "${ORIG_USER_PREVIOUS}" > "${USER_PREVIOUS_FILE}"
              else
                rm -f "${USER_PREVIOUS_FILE}"
              fi
              restart_auth_services || true
              wait_for_service backend || true
              wait_for_service frontend || true
              wait_for_service admin || true
            fi
            rm -rf "${TMP_DIR}"
          }
          trap cleanup EXIT

          compose() {
            cd "${CURRENT_DIR}"
            docker compose --env-file ./.env.d/compose.env -f docker-compose.prod.yml "$@"
          }

          container_id() {
            compose ps -q "$1"
          }

          wait_for_service() {
            service="$1"
            deadline=$((SECONDS + 300))
            while [ "${SECONDS}" -lt "${deadline}" ]; do
              cid="$(container_id "${service}")"
              if [ -n "${cid}" ]; then
                status="$(docker inspect -f '{{.State.Status}}' "${cid}")"
                health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "${cid}")"
                if [ "${status}" = "running" ] && { [ "${health}" = "healthy" ] || [ "${health}" = "none" ]; }; then
                  echo "service ${service}: ${status}/${health}"
                  return 0
                fi
              fi
              sleep 3
            done

            compose ps
            echo "Timed out waiting for ${service} to become healthy." >&2
            return 1
          }

          restart_auth_services() {
            compose up -d --force-recreate \
              backend \
              notification-worker \
              fairness-audit-worker \
              prediction-market-oracle-worker \
              kyc-reverification-worker \
              blackjack-timeout-worker \
              holdem-timeout-worker \
              frontend \
              admin
          }

          fingerprint() {
            printf '%s' "$1" | sha256sum | awk '{print substr($1, 1, 12)}'
          }

          ADMIN_CURRENT_FILE="${SECRET_DIR}/admin_jwt_secret"
          ADMIN_PREVIOUS_FILE="${SECRET_DIR}/admin_jwt_secret_previous"
          USER_CURRENT_FILE="${SECRET_DIR}/user_jwt_secret"
          USER_PREVIOUS_FILE="${SECRET_DIR}/user_jwt_secret_previous"

          test -r "${ADMIN_CURRENT_FILE}"
          test -r "${USER_CURRENT_FILE}"

          ORIG_ADMIN_CURRENT="$(tr -d '\n' < "${ADMIN_CURRENT_FILE}")"
          ORIG_USER_CURRENT="$(tr -d '\n' < "${USER_CURRENT_FILE}")"
          ORIG_ADMIN_PREVIOUS="$(if [ -f "${ADMIN_PREVIOUS_FILE}" ]; then tr -d '\n' < "${ADMIN_PREVIOUS_FILE}"; fi)"
          ORIG_USER_PREVIOUS="$(if [ -f "${USER_PREVIOUS_FILE}" ]; then tr -d '\n' < "${USER_PREVIOUS_FILE}"; fi)"

          if [ -n "${ORIG_ADMIN_PREVIOUS}" ] && [ "${ORIG_ADMIN_PREVIOUS}" != "${ORIG_ADMIN_CURRENT}" ]; then
            echo "ADMIN_JWT_SECRET_PREVIOUS is already active. Finish the in-flight rotation first." >&2
            exit 1
          fi

          if [ -n "${ORIG_USER_PREVIOUS}" ] && [ "${ORIG_USER_PREVIOUS}" != "${ORIG_USER_CURRENT}" ]; then
            echo "USER_JWT_SECRET_PREVIOUS is already active. Finish the in-flight rotation first." >&2
            exit 1
          fi

          BACKEND_BEFORE="$(container_id backend)"
          FRONTEND_BEFORE="$(container_id frontend)"
          ADMIN_BEFORE="$(container_id admin)"

          docker exec -i "${BACKEND_BEFORE}" node --input-type=module <<'NODE' > "${TMP_DIR}/pre-rotation.env"
          import { admins, users } from '@reward/database';
          import { eq, isNull } from '@reward/database/orm';
          import { db } from '/app/apps/backend/dist/db.js';
          import { createAdminSessionToken } from '/app/apps/backend/dist/shared/admin-session.js';
          import { createUserSessionToken } from '/app/apps/backend/dist/shared/user-session.js';

          const [adminRow] = await db
            .select({
              adminId: admins.id,
              userId: users.id,
              email: users.email,
            })
            .from(admins)
            .innerJoin(users, eq(admins.userId, users.id))
            .limit(1);

          if (!adminRow?.email) {
            throw new Error('No admin user available for drill.');
          }

          const [regularUserRow] = await db
            .select({
              userId: users.id,
              email: users.email,
            })
            .from(users)
            .leftJoin(admins, eq(admins.userId, users.id))
            .where(isNull(admins.id))
            .limit(1);

          const userRow = regularUserRow?.email
            ? regularUserRow
            : {
                userId: adminRow.userId,
                email: adminRow.email,
              };

          const userSession = await createUserSessionToken({
            userId: userRow.userId,
            email: userRow.email,
            role: 'user',
          });

          const adminSession = await createAdminSessionToken({
            adminId: adminRow.adminId,
            userId: adminRow.userId,
            email: adminRow.email,
            role: 'admin',
            mfaEnabled: false,
            mfaRecoveryMode: 'none',
          });

          console.log(`OLD_USER_EMAIL=${userRow.email}`);
          console.log(`OLD_USER_TOKEN=${userSession.token}`);
          console.log(`OLD_ADMIN_EMAIL=${adminRow.email}`);
          console.log(`OLD_ADMIN_TOKEN=${adminSession.token}`);
          NODE

          set -a
          . "${TMP_DIR}/pre-rotation.env"
          set +a

          validate_backend_user() {
            token="$1"
            docker exec -i -e TOKEN="${token}" "$(container_id backend)" node --input-type=module <<'NODE'
            const token = process.env.TOKEN ?? '';
            const response = await fetch('http://127.0.0.1:4000/auth/user/session', {
              headers: { authorization: `Bearer ${token}` },
              redirect: 'manual',
            });
            if (!response.ok) {
              console.error(await response.text());
              process.exit(1);
            }
            console.log('backend user session ok');
            NODE
          }

          validate_backend_admin() {
            token="$1"
            docker exec -i -e TOKEN="${token}" "$(container_id backend)" node --input-type=module <<'NODE'
            const token = process.env.TOKEN ?? '';
            const response = await fetch('http://127.0.0.1:4000/auth/admin/session', {
              headers: { cookie: `reward_admin_session=${encodeURIComponent(token)}` },
              redirect: 'manual',
            });
            if (!response.ok) {
              console.error(await response.text());
              process.exit(1);
            }
            console.log('backend admin session ok');
            NODE
          }

          validate_frontend_login() {
            token="$1"
            docker exec -i -e TOKEN="${token}" "$(container_id frontend)" node --input-type=module <<'NODE'
            const token = process.env.TOKEN ?? '';
            const response = await fetch('http://127.0.0.1:3000/login', {
              headers: {
                cookie: `reward.backend-token=${encodeURIComponent(token)}`,
              },
              redirect: 'manual',
            });
            const location = response.headers.get('location') ?? '';
            if (!(response.status >= 300 && response.status < 400 && location.endsWith('/app'))) {
              console.error(`Unexpected frontend response: status=${response.status} location=${location}`);
              process.exit(1);
            }
            console.log(`frontend login redirect ok: ${location}`);
            NODE
          }

          validate_admin_login() {
            token="$1"
            docker exec -i -e TOKEN="${token}" "$(container_id admin)" node --input-type=module <<'NODE'
            const token = process.env.TOKEN ?? '';
            const response = await fetch('http://127.0.0.1:3000/login', {
              headers: {
                cookie: `reward_admin_session=${encodeURIComponent(token)}`,
              },
              redirect: 'manual',
            });
            const location = response.headers.get('location') ?? '';
            if (!(response.status >= 300 && response.status < 400 && location && !location.endsWith('/login'))) {
              console.error(`Unexpected admin response: status=${response.status} location=${location}`);
              process.exit(1);
            }
            console.log(`admin login redirect ok: ${location}`);
            NODE
          }

          NEW_ADMIN_CURRENT="$(openssl rand -base64 48 | tr '+/' '-_' | tr -d '=\n')"
          NEW_USER_CURRENT="$(openssl rand -base64 48 | tr '+/' '-_' | tr -d '=\n')"

          if [ "${NEW_ADMIN_CURRENT}" = "${ORIG_ADMIN_CURRENT}" ] || [ "${NEW_USER_CURRENT}" = "${ORIG_USER_CURRENT}" ]; then
            echo "Generated secret collided with current secret." >&2
            exit 1
          fi

          printf '%s\n' "${ORIG_ADMIN_CURRENT}" > "${ADMIN_PREVIOUS_FILE}"
          printf '%s\n' "${ORIG_USER_CURRENT}" > "${USER_PREVIOUS_FILE}"
          printf '%s\n' "${NEW_ADMIN_CURRENT}" > "${ADMIN_CURRENT_FILE}"
          printf '%s\n' "${NEW_USER_CURRENT}" > "${USER_CURRENT_FILE}"
          chmod 600 "${ADMIN_CURRENT_FILE}" "${ADMIN_PREVIOUS_FILE}" "${USER_CURRENT_FILE}" "${USER_PREVIOUS_FILE}"

          JWT_ROLLBACK_REQUIRED=1

          restart_auth_services
          wait_for_service backend
          wait_for_service frontend
          wait_for_service admin

          echo "Validating pre-rotation sessions against *_PREVIOUS..."
          validate_backend_user "${OLD_USER_TOKEN}"
          validate_backend_admin "${OLD_ADMIN_TOKEN}"
          validate_frontend_login "${OLD_USER_TOKEN}"
          validate_admin_login "${OLD_ADMIN_TOKEN}"

          docker exec -i "$(container_id backend)" node --input-type=module <<'NODE' > "${TMP_DIR}/post-rotation.env"
          import { admins, users } from '@reward/database';
          import { eq, isNull } from '@reward/database/orm';
          import { db } from '/app/apps/backend/dist/db.js';
          import { createAdminSessionToken } from '/app/apps/backend/dist/shared/admin-session.js';
          import { createUserSessionToken } from '/app/apps/backend/dist/shared/user-session.js';

          const [adminRow] = await db
            .select({
              adminId: admins.id,
              userId: users.id,
              email: users.email,
            })
            .from(admins)
            .innerJoin(users, eq(admins.userId, users.id))
            .limit(1);

          if (!adminRow?.email) {
            throw new Error('No admin user available after rotation.');
          }

          const [regularUserRow] = await db
            .select({
              userId: users.id,
              email: users.email,
            })
            .from(users)
            .leftJoin(admins, eq(admins.userId, users.id))
            .where(isNull(admins.id))
            .limit(1);

          const userRow = regularUserRow?.email
            ? regularUserRow
            : {
                userId: adminRow.userId,
                email: adminRow.email,
              };

          const userSession = await createUserSessionToken({
            userId: userRow.userId,
            email: userRow.email,
            role: 'user',
          });

          const adminSession = await createAdminSessionToken({
            adminId: adminRow.adminId,
            userId: adminRow.userId,
            email: adminRow.email,
            role: 'admin',
            mfaEnabled: false,
            mfaRecoveryMode: 'none',
          });

          console.log(`NEW_USER_TOKEN=${userSession.token}`);
          console.log(`NEW_ADMIN_TOKEN=${adminSession.token}`);
          NODE

          set -a
          . "${TMP_DIR}/post-rotation.env"
          set +a

          echo "Validating fresh sessions against current secrets..."
          validate_backend_user "${NEW_USER_TOKEN}"
          validate_backend_admin "${NEW_ADMIN_TOKEN}"
          validate_frontend_login "${NEW_USER_TOKEN}"
          validate_admin_login "${NEW_ADMIN_TOKEN}"

          JWT_ROLLBACK_REQUIRED=0

          echo "JWT drill committed."
          echo "  admin old fp: $(fingerprint "${ORIG_ADMIN_CURRENT}")"
          echo "  admin new fp: $(fingerprint "${NEW_ADMIN_CURRENT}")"
          echo "  user old fp : $(fingerprint "${ORIG_USER_CURRENT}")"
          echo "  user new fp : $(fingerprint "${NEW_USER_CURRENT}")"
          echo "  finalize after at least one full TTL drain window."

          docker exec -i -e DRILL_SLUG="ops-secret-rotation-drill" -e SAAS_OVERLAP_SECONDS="${SAAS_OVERLAP_SECONDS}" "$(container_id backend)" node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { saasProjects, saasTenants } from '@reward/database';
          import { and, eq } from '@reward/database/orm';
          import { db } from '/app/apps/backend/dist/db.js';
          import {
            authenticateProjectApiKey,
            createProjectApiKey,
            createSaasProject,
            createSaasTenant,
            rotateProjectApiKey,
          } from '/app/apps/backend/dist/modules/saas/service.js';

          const drillSlug = process.env.DRILL_SLUG ?? 'ops-secret-rotation-drill';
          const overlapSeconds = Number(process.env.SAAS_OVERLAP_SECONDS ?? '300');
          const fingerprint = (value) =>
            createHash('sha256').update(value).digest('hex').slice(0, 12);

          const [existingTenant] = await db
            .select()
            .from(saasTenants)
            .where(eq(saasTenants.slug, drillSlug))
            .limit(1);

          const tenant = existingTenant
            ? existingTenant
            : await createSaasTenant({
                slug: drillSlug,
                name: 'Ops Secret Rotation Drill',
                billingEmail: 'ops-secret-rotation-drill@example.invalid',
                metadata: {
                  source: 'ops_secret_rotation_drill',
                },
              });

          const tenantId = tenant.id;

          const [existingProject] = await db
            .select()
            .from(saasProjects)
            .where(
              and(
                eq(saasProjects.tenantId, tenantId),
                eq(saasProjects.slug, 'canary'),
              ),
            )
            .limit(1);

          const project = existingProject
            ? existingProject
            : await createSaasProject({
                tenantId,
                slug: 'canary',
                name: 'Ops Secret Rotation Canary',
                environment: 'sandbox',
                currency: 'USD',
                drawCost: '0',
                prizePoolBalance: '0',
                metadata: {
                  source: 'ops_secret_rotation_drill',
                },
              });

          const currentKey = await createProjectApiKey({
            projectId: project.id,
            label: `quarterly-drill-${Date.now()}`,
          });

          const oldBefore = await authenticateProjectApiKey(currentKey.apiKey);
          const rotation = await rotateProjectApiKey(project.id, currentKey.id, {
            overlapSeconds,
            reason: 'quarterly-secret-rotation-drill',
          });
          const newBefore = await authenticateProjectApiKey(rotation.issuedKey.apiKey);

          const overlapEndsAt = new Date(rotation.overlapEndsAt).getTime();
          const waitMs = Math.max(overlapEndsAt - Date.now() + 1500, 1500);
          await new Promise((resolve) => setTimeout(resolve, waitMs));

          let oldRejected = false;
          try {
            await authenticateProjectApiKey(currentKey.apiKey);
          } catch {
            oldRejected = true;
          }

          if (!oldRejected) {
            throw new Error('Old SaaS API key still authenticated after overlap expiry.');
          }

          const newAfter = await authenticateProjectApiKey(rotation.issuedKey.apiKey);

          console.log('SaaS drill committed.');
          console.log(`  tenant id      : ${tenantId}`);
          console.log(`  project id     : ${project.id}`);
          console.log(`  previous key id: ${currentKey.id}`);
          console.log(`  new key id     : ${rotation.issuedKey.id}`);
          console.log(`  previous fp    : ${fingerprint(currentKey.apiKey)}`);
          console.log(`  new fp         : ${fingerprint(rotation.issuedKey.apiKey)}`);
          console.log(`  overlap ends   : ${new Date(rotation.overlapEndsAt).toISOString()}`);
          console.log(`  old before     : apiKeyId=${oldBefore.apiKeyId}`);
          console.log(`  new before     : apiKeyId=${newBefore.apiKeyId}`);
          console.log(`  new after      : apiKeyId=${newAfter.apiKeyId}`);
          NODE
          REMOTE
